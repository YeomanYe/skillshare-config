# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
source: ~/.config/skillshare/skills
extras_source: ~/.config/skillshare/extras
mode: merge
targets:
  claude:
    skills:
      path: ~/.claude/skills
      include: &shared_skill_includes
        - _agent-browser-official__skills__agent-browser
        - _vercel-labs-skills__skills__find-skills
        - _anthropics-skills__skills__skill-creator
        - _anthropics-skills__skills__pdf
        - _remorses-playwriter__skills__playwriter
        - _denoland-skills__skills__deno-expert
        - _denoland-skills__skills__deno-frontend
        - _oaustegard-claude-skills__developing-preact
        - _vercel-labs-agent-skills__skills__react-best-practices
        - _obra-superpowers__skills__*
        - _YeomanYe-skills__*
        - _DietrichGebert-ponytail__skills__ponytail*
        - _anthropics-skills__skills__frontend-design
        - _alchaincyf-huashu-design
  witsy:
    skills:
      path: ~/.agents/skills
      include: *shared_skill_includes
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
