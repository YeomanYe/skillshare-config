# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
source: ~/.config/skillshare/skills
extras_source: ~/.config/skillshare/extras
mode: merge
targets:
  claude:
    skills:
      path: ~/.claude/skills
      include: &shared_skill_includes
        # 散装工具
        - _agent-browser-official__skills__agent-browser
        - _anthropics-skills__skills__pdf
        # YeomanYe 核心工作流
        - _YeomanYe-skills__flow-dev-task
        - _YeomanYe-skills__flow-cron
        - _YeomanYe-skills__clean-commit
        - _YeomanYe-skills__mem
        - _YeomanYe-skills__exp-sum
        - _YeomanYe-skills__microscope
        - _YeomanYe-skills__delivery-gate
        - _YeomanYe-skills__hat
        - _YeomanYe-skills__director-frontend
        - _YeomanYe-skills__director-design
        - _YeomanYe-skills__director-architect
        - _YeomanYe-skills__director-ops
        # skill 开发链
        - _YeomanYe-skills__flow-skill-dev
        - _YeomanYe-skills__skill-behavior-test
        - _YeomanYe-skills__skill-integration-test
        - _YeomanYe-skills__sync-skills
        - _YeomanYe-skills__flow-skill-research
  witsy:
    skills:
      path: ~/.agents/skills
      include: *shared_skill_includes
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
